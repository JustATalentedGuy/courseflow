services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-courseflow}
      POSTGRES_USER: ${POSTGRES_USER:-courseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseflow} -d ${POSTGRES_DB:-courseflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-courseflow}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
    restart: "no"

  diagram-renderer:
    build:
      context: ./diagram-renderer
    environment:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3010/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    environment: &backend-environment
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-courseflow}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-courseflow}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-courseflow}
      MINIO_SECURE: "false"
      DIAGRAM_RENDERER_URL: ${DIAGRAM_RENDERER_URL:-http://diagram-renderer:3010}
      SECRET_KEY: ${SECRET_KEY:-development_only_change_me}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BATCH_ENABLED: ${GROQ_BATCH_ENABLED:-false}
      GROQ_AUTO_MODEL: ${GROQ_AUTO_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_HIGH_QUALITY_MODEL: ${GROQ_HIGH_QUALITY_MODEL:-llama-3.3-70b-versatile}
      GROQ_DAILY_RESERVE_PERCENT: ${GROQ_DAILY_RESERVE_PERCENT:-0}
      GROQ_SCOUT_RPM: ${GROQ_SCOUT_RPM:-30}
      GROQ_SCOUT_RPD: ${GROQ_SCOUT_RPD:-1000}
      GROQ_SCOUT_TPM: ${GROQ_SCOUT_TPM:-30000}
      GROQ_SCOUT_TPD: ${GROQ_SCOUT_TPD:-500000}
      GROQ_70B_RPM: ${GROQ_70B_RPM:-30}
      GROQ_70B_RPD: ${GROQ_70B_RPD:-1000}
      GROQ_70B_TPM: ${GROQ_70B_TPM:-12000}
      GROQ_70B_TPD: ${GROQ_70B_TPD:-100000}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      GROQ_WHISPER_RPM: ${GROQ_WHISPER_RPM:-20}
      GROQ_WHISPER_RPD: ${GROQ_WHISPER_RPD:-2000}
      GROQ_WHISPER_ASH: ${GROQ_WHISPER_ASH:-7200}
      GROQ_WHISPER_ASD: ${GROQ_WHISPER_ASD:-28800}
      YOUTUBE_AUDIO_DOWNLOAD_MIN_TIMEOUT_SECONDS: ${YOUTUBE_AUDIO_DOWNLOAD_MIN_TIMEOUT_SECONDS:-120}
      YOUTUBE_AUDIO_DOWNLOAD_MAX_TIMEOUT_SECONDS: ${YOUTUBE_AUDIO_DOWNLOAD_MAX_TIMEOUT_SECONDS:-900}
      YOUTUBE_AUDIO_DOWNLOAD_TIMEOUT_SECONDS_PER_MINUTE: ${YOUTUBE_AUDIO_DOWNLOAD_TIMEOUT_SECONDS_PER_MINUTE:-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_IMAGE_MODEL: ${CLOUDFLARE_IMAGE_MODEL:-@cf/black-forest-labs/flux-2-klein-4b}
      CLOUDFLARE_DAILY_NEURON_BUDGET: ${CLOUDFLARE_DAILY_NEURON_BUDGET:-8000}
      CLOUDFLARE_IMAGE_ESTIMATED_NEURONS: ${CLOUDFLARE_IMAGE_ESTIMATED_NEURONS:-400}
      CLOUDFLARE_IMAGE_CONCURRENCY: ${CLOUDFLARE_IMAGE_CONCURRENCY:-1}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173"]}'
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m alembic upgrade head
    restart: "no"

  backend:
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      diagram-renderer:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app

  diagram-worker:
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      diagram-renderer:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=1 -Q diagrams
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:
